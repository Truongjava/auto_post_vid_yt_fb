name: Upload Video to YouTube

on:
  workflow_dispatch:  # Cho phép chạy thủ công từ GitHub UI
  schedule:
    # Chạy 2 lần mỗi ngày:
    # 10h30 sáng (giờ VN) = 3h30 UTC
    # 18h00 tối (giờ VN)   = 11h00 UTC
    - cron: "30 3 * * *"
    - cron: "0 11 * * *"

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secrets to files
        env:
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
        run: |
          echo "$CLIENT_SECRET_JSON" > client_secret.json
          echo "$TOKEN_JSON" > token.json

      - name: Run upload pipeline
        env:
          PRIVACY_STATUS: ${{ vars.PRIVACY_STATUS || 'private' }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: python pipeline.py

      - name: Update token secret (if refreshed)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEW_TOKEN=$(cat token.json | jq -c .)
          if [ -n "$NEW_TOKEN" ]; then
            echo "$NEW_TOKEN" | gh secret set TOKEN_JSON --repo ${{ github.repository }}
            echo "✅ Đã cập nhật TOKEN_JSON secret"
          fi
